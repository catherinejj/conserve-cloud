<div class="register-wrapper">
  <div class="register-card">

    <div class="register-header">
      <img class="logo" src="/logo-conserve-cloud-tp.png" alt="Conserve Cloud" />
      <h1>Creer un compte</h1>
      <p>Rejoignez Conserve Cloud</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="row">
        <div class="field" [class.has-error]="firstName.invalid && firstName.touched">
          <label for="firstName">Prenom</label>
          <input
            id="firstName"
            type="text"
            formControlName="firstName"
            placeholder="Marie"
            autocomplete="given-name"
          />
          <span class="field-error" *ngIf="firstName.touched && firstName.hasError('required')">Requis.</span>
          <span class="field-error" *ngIf="firstName.touched && firstName.hasError('minlength')">2 caracteres min.</span>
        </div>

        <div class="field" [class.has-error]="lastName.invalid && lastName.touched">
          <label for="lastName">Nom</label>
          <input
            id="lastName"
            type="text"
            formControlName="lastName"
            placeholder="Dupont"
            autocomplete="family-name"
          />
          <span class="field-error" *ngIf="lastName.touched && lastName.hasError('required')">Requis.</span>
          <span class="field-error" *ngIf="lastName.touched && lastName.hasError('minlength')">2 caracteres min.</span>
        </div>
      </div>

      <div class="field" [class.has-error]="birthDate.invalid && birthDate.touched">
        <label for="birthDate">Date de naissance</label>
        <input
          id="birthDate"
          type="date"
          formControlName="birthDate"
          [max]="today"
        />
        <span class="field-error" *ngIf="birthDate.touched && birthDate.hasError('required')">Requis.</span>
      </div>

      <div class="field" [class.has-error]="email.invalid && email.touched">
        <label for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="vous@exemple.fr"
          autocomplete="email"
        />
        <span class="field-error" *ngIf="email.touched && email.hasError('required')">Requis.</span>
        <span class="field-error" *ngIf="email.touched && email.hasError('email')">Format invalide.</span>
      </div>

      <div class="field" [class.has-error]="password.invalid && password.touched">
        <label for="password">Mot de passe</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Masquer' : 'Afficher'"
          >{{ showPassword ? '&#x1F648;' : '&#x1F440;' }}</button>
        </div>
        <span class="field-error" *ngIf="password.touched && password.hasError('required')">Requis.</span>
        <span class="field-error" *ngIf="password.touched && password.hasError('minlength')">6 caracteres min.</span>
      </div>

      <div class="server-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Creer mon compte</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <p class="switch-link">
      Deja un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>

  </div>
</div>
