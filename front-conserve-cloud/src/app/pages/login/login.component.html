<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <img class="logo" src="/logo-conserve-cloud-tp.png" alt="Conserve Cloud" />
      <h1>Conserve Cloud</h1>
      <p>Connectez-vous a votre compte</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="field" [class.has-error]="email.invalid && email.touched">
        <label for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="vous@exemple.fr"
          autocomplete="email"
        />
        <span class="field-error" *ngIf="email.touched && email.hasError('required')">
          L'e-mail est requis.
        </span>
        <span class="field-error" *ngIf="email.touched && email.hasError('email')">
          Format d'e-mail invalide.
        </span>
      </div>

      <div class="field" [class.has-error]="password.invalid && password.touched">
        <label for="password">Mot de passe</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Masquer' : 'Afficher'"
          >
            {{ showPassword ? '&#x1F648;' : '&#x1F440;' }}
          </button>
        </div>
        <span class="field-error" *ngIf="password.touched && password.hasError('required')">
          Le mot de passe est requis.
        </span>
        <span class="field-error" *ngIf="password.touched && password.hasError('minlength')">
          Minimum 6 caracteres.
        </span>
      </div>

      <div class="server-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <p class="switch-link">
      Pas encore de compte ?
      <a routerLink="/register">S'inscrire</a>
    </p>

  </div>
</div>
